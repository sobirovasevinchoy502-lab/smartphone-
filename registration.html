<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <form action="">
        <fieldset>
            <legend>registration</legend>
            <ul>
                <li>
                    <a href="index.html">bosh menu</a>

            </ul>
            <ul>
                <li>
                    <input type="text" placeholder="Name" required>
                </li>
                <br>
                <li>
                    <input type="email" placeholder="Email" required>

                <br>
                <li>
                    <input type="password" placeholder="Password" required>
                </li>
                <br>
                <li>
                    <input type="search" placeholder="Search" required>
                </li>
                <br>
                <li>
                    <input type="number" placeholder="Number" required>
                </li>
                <br>

                <h1>data month year</h1>

                <h1>select the type</h1>
                <label for="telefon">
                    Telefon

                    Noutbook

                <br>
                <label for="planshet">

                <br>

                <h1>select the price</h1>
                <label for="250$">
                    250$
                    <input name="bm" id="250$" type="radio">
                </label>
                <br>
                <label for="500$">
                    500$
                    <input name="bm" id="500$" type="radio">
                </label>
                <br>
                <label for="1000$">
                    1000$

                <select style="margin: 10px;" name="" id="select">
                    <option value="">America</option>
                    <option value="">England</option>
                    <option value="">Russia</option>

                <input style="padding: 10px;" type="file">
                <br>
                <label for="l am not a robot">

                    <input id=" l am not a robot" type="checkbox">
                </label>
                <br>

                <br>

                <button type="submit">submit</button>
                <button type="reset">clear</button>
            </ul>
